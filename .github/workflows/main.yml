name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build & Publish Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by AGP 8 / Kotlin 1.9) ─────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # ── 3. Bootstrap gradle-wrapper.jar (not stored in git) ──────────────────
      - name: Bootstrap Gradle Wrapper
        run: |
          cd nova-android
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading Gradle 8.4 to generate wrapper jar..."
            curl -fsSL https://services.gradle.org/distributions/gradle-8.4-bin.zip \
              -o /tmp/gradle-8.4-bin.zip
            unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/
            /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 \
              --distribution-type bin
            echo "Wrapper jar generated."
          else
            echo "Wrapper jar already present."
          fi

      # ── 4. Accept Android SDK licenses (required on GitHub-hosted runners) ──────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 5. Make gradlew executable ────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x nova-android/gradlew

      # ── 7. Build debug APK ────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: nova-android
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      # ── 8. Rename APK with build number ──────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp nova-android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/NOVA-debug-${{ github.run_number }}.apk
          echo "APK_PATH=apk-output/NOVA-debug-${{ github.run_number }}.apk" \
             >> $GITHUB_ENV
          echo "APK_NAME=NOVA-debug-${{ github.run_number }}.apk" \
             >> $GITHUB_ENV

      # ── 9. Upload as workflow artifact (downloadable from Actions tab) ────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-debug-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # ── 10. Publish / overwrite the "debug-latest" GitHub Release ─────────────
      - name: Publish to GitHub Releases (debug-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "NOVA – Latest Debug Build"
          body: |
            ## 📱 NOVA Debug APK — Build #${{ github.run_number }}

            Built from commit `${{ github.sha }}` on `${{ github.ref_name }}`.

            ### How to install on your Android phone
            1. Download **${{ env.APK_NAME }}** below.
            2. Open the downloaded file in your browser's Downloads folder.
            3. If prompted, enable **Install unknown apps** for your browser.
            4. Tap **Install**.
            5. Open **NOVA**, go to ⚙ Settings, and paste your OpenAI or Gemini API key.

            > **Note:** This is a debug build (not release-signed). It is fully functional.
            > For a production-signed APK see the `nova-release-apk` workflow.
          files: ${{ env.APK_PATH }}
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
